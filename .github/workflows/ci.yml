name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Laravel (PHP 8.4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          # predis is userland (no ext-redis needed); keep extensions minimal/reliable.
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Copy environment file
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate app key
        run: php artisan key:generate

      - name: Run unit tests (pure logic — blocking)
        run: php artisan test --testsuite=Unit --no-interaction

      - name: Run feature tests (non-blocking until verified on a runner)
        continue-on-error: true
        run: php artisan test --testsuite=Feature --no-interaction

  ai-service:
    name: FastAPI (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Import + boot smoke test
        run: |
          python -c "import app.main; print('FastAPI app imports OK')"
          python -c "from app.providers.manager import manager; print('providers:', manager.status())"

      - name: Recommender unit check
        run: |
          python - <<'PY'
          import asyncio
          from app.schemas import RecommendRequest, Offer
          from app.routers.recommend import recommend
          req = RecommendRequest(category='hotels', limit=2, offers=[
              Offer(title='A', price=5000, cashback=100, rating=4.0),
              Offer(title='B', price=5200, cashback=600, rating=4.5),
          ])
          res = asyncio.run(recommend(req))
          assert res.ranked[0].title == 'B', 'higher cashback-value should rank first'
          print('recommender ranking OK')
          PY
