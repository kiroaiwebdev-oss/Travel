name: travelcash

# Single-VPS production stack. `docker compose up -d --build` brings up the whole platform.
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tc_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-app.ini:ro
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      meilisearch:
        condition: service_started
    networks: [tc_net]

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tc_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=1 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    depends_on:
      - app
      - redis
    networks: [tc_net]

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tc_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    # Runs Laravel scheduler every minute (cashback maturation, cache warmups, etc.)
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    depends_on:
      - app
    networks: [tc_net]

  nginx:
    image: nginx:1.27-alpine
    container_name: tc_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
      - ai
    networks: [tc_net]

  mysql:
    image: mysql:8.0
    container_name: tc_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-travelcash}
      MYSQL_USER: ${DB_USERNAME:-travelcash}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=512M
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [tc_net]

  redis:
    image: redis:7-alpine
    container_name: tc_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    networks: [tc_net]

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: tc_meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKeyChangeMe}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    networks: [tc_net]

  ai:
    build:
      context: .
      dockerfile: docker/ai/Dockerfile
    container_name: tc_ai
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    volumes:
      - ./ai-service:/app
    networks: [tc_net]

volumes:
  mysql_data:
  redis_data:
  meili_data:

networks:
  tc_net:
    driver: bridge
